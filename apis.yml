created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: sysaid:rest-api
    name: SysAid REST API
    description: >-
      REST API for managing SysAid service records (incidents, requests,
      problems, changes), users, assets, and SLAs. Authentication uses
      Client Credentials to mint short-lived application access tokens
      (default 24h lifetime) via the /v1/application-keys endpoint.
    humanURL: https://developers.sysaid.com/docs/authentication-guide
    baseURL: https://your-account.sysaidit.com
    tags:
      - Service Records
      - Tickets
      - Assets
      - Users
      - Workflows
    properties:
      - type: Documentation
        url: https://documentation.sysaid.com/docs/rest-api-guide
      - type: Authentication Guide
        url: https://developers.sysaid.com/docs/authentication-guide

