aid: sysaid
name: SysAid
description: >-
  SysAid is an AI-powered IT service management (ITSM) and help desk platform
  that helps IT teams manage tickets, assets, workflows, problem and change
  management, self-service portals, and automation. The platform combines a
  generative AI service desk with asset management, SLA tracking, and reporting.
  SysAid exposes a REST API with Client Credentials authentication issuing
  short-lived tokens for managing service records, users, assets, and more.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - ITSM
  - Help Desk
  - IT Service Management
  - Asset Management
  - Ticketing
  - Service Desk
url: >-
